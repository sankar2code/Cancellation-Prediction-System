<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>At-Risk Queue · Foresight</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/app.css" />
</head>
<body>
  <div id="scrim" class="fixed inset-0 bg-slate-900/50 z-30 hidden lg:hidden"></div>
  <div class="flex min-h-screen">
    <aside id="sidebar" class="w-64 shrink-0 bg-slate-900 flex flex-col fixed lg:sticky top-0 h-screen z-40 -translate-x-full lg:translate-x-0 transition-transform duration-200"></aside>
    <div class="flex-1 flex flex-col min-w-0">
      <header id="topbar" class="sticky top-0 z-20 bg-white/90 backdrop-blur border-b border-slate-200 flex items-center gap-3 px-4 sm:px-6 py-3"></header>
      <main class="p-4 sm:p-6 lg:p-8 w-full max-w-[1400px] mx-auto fade-up">

        <!-- Summary strip -->
        <section class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-4">
          <div class="card card-pad"><div class="text-xs text-slate-500">Showing</div><div class="text-2xl font-bold tnum"><span id="shownCount">0</span> <span class="text-base text-slate-400">/ <span id="totalCount"></span></span></div></div>
          <div class="card card-pad"><div class="text-xs text-slate-500">High risk (≥70%)</div><div class="text-2xl font-bold tnum risk-high">4</div></div>
          <div class="card card-pad"><div class="text-xs text-slate-500">Avg lead time</div><div class="text-2xl font-bold tnum">84d</div></div>
          <div class="card card-pad"><div class="text-xs text-slate-500">Revenue at risk</div><div class="text-2xl font-bold tnum">$41.2k</div></div>
        </section>

        <div class="card overflow-hidden">
          <!-- Toolbar -->
          <div class="card-pad border-b border-slate-100 flex flex-col lg:flex-row lg:items-center gap-4">
            <div class="relative flex-1 max-w-xs">
              <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" style="width:16px;height:16px"></i>
              <input class="input pl-9" placeholder="Search booking ID or guest…" oninput="filterText(this.value)" />
            </div>
            <select class="select max-w-[160px]" onchange="filterSeg(this.value)">
              <option value="">All segments</option><option>Online</option><option>Offline</option><option>Corporate</option><option>Aviation</option>
            </select>

            <div class="flex items-center gap-3 lg:ml-auto">
              <div class="flex items-center gap-2">
                <i data-lucide="sliders-horizontal" class="text-slate-400" style="width:16px;height:16px"></i>
                <span class="text-sm text-slate-600">Risk threshold</span>
                <span id="thLabel" class="badge badge-brand tnum">70%</span>
              </div>
              <input id="threshold" type="range" min="0" max="100" value="70" step="1" class="w-40 accent-indigo-600" oninput="onThreshold(this.value)" />
            </div>
          </div>

          <div class="overflow-x-auto">
            <table class="tbl">
              <thead><tr>
                <th>Booking</th><th>Segment</th><th>Arrival</th><th>Lead</th><th>Price/nt</th>
                <th>Risk score</th><th>Band</th><th>Recommended action</th><th>Status</th><th></th>
              </tr></thead>
              <tbody id="queueBody"></tbody>
            </table>
          </div>

          <div class="card-pad border-t border-slate-100 flex items-center justify-between text-sm text-slate-500">
            <span>Scored at reservation time · explanations per FR2 · audit log per FR10</span>
            <button class="btn btn-ghost btn-sm" onclick="toast('Queue exported to CSV')"><i data-lucide="download"></i> Export</button>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="assets/data.js"></script>
  <script src="assets/app.js"></script>
  <script>
    renderShell('queue');
    document.getElementById('totalCount').textContent = BOOKINGS.length;
    let TH = 70, SEG = '', TXT = '';

    function draw() {
      const host = document.getElementById('queueBody');
      const rows = BOOKINGS
        .filter(b => b.score >= TH)
        .filter(b => !SEG || b.segment === SEG)
        .filter(b => !TXT || (b.id + ' ' + b.guest).toLowerCase().includes(TXT))
        .sort((a, b) => b.score - a.score);
      document.getElementById('shownCount').textContent = rows.length;
      host.innerHTML = rows.length ? rows.map(b => bookingRow(b, false)).join('')
        : `<tr><td colspan="10" class="py-16 text-center text-slate-400">
            <i data-lucide="check-circle-2" class="mx-auto mb-2" style="width:34px;height:34px"></i>
            <div class="font-medium text-slate-600">No bookings match these filters</div>
            <div class="text-sm">Lower the risk threshold or clear the search.</div></td></tr>`;
      lucide.createIcons();
    }
    function onThreshold(v){ TH = +v; document.getElementById('thLabel').textContent = v + '%'; draw(); }
    function filterSeg(v){ SEG = v; draw(); }
    function filterText(v){ TXT = v.toLowerCase().trim(); draw(); }
    draw();
  </script>
</body>
</html>
